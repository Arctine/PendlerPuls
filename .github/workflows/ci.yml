name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Restore backend
        run: dotnet restore PendlerPuls.sln

      - name: Build backend
        run: dotnet build PendlerPuls.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test PendlerPuls.sln --configuration Release --no-build

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Test frontend
        run: npm test
        working-directory: apps/web

      - name: Build frontend
        run: npm run build
        working-directory: apps/web
