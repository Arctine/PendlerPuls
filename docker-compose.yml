services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pendlerpuls
      POSTGRES_USER: pendlerpuls
      POSTGRES_PASSWORD: pendlerpuls
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pendlerpuls"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_PROVIDER: Postgres
      ConnectionStrings__Postgres: Host=database;Port=5432;Database=pendlerpuls;Username=pendlerpuls;Password=pendlerpuls
      Entur__ClientName: arctine-pendlerpuls
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:

